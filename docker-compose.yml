version: '3.9'

services:

  backend:
    build: ./backend
    container_name: devops-backend

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: student
      DB_PASSWORD: student123
      DB_NAME: devops_learning

    ports:
      - "8080:8080"

    depends_on:
      - mysql

  frontend:
    image: nginx:latest
    container_name: devops-frontend

    volumes:
      - ./frontend:/usr/share/nginx/html

    ports:
      - "3000:80"

  mysql:
    image: mysql:8.0
    container_name: devops-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devops_learning
      MYSQL_USER: student
      MYSQL_PASSWORD: student123

    ports:
      - "3307:3306"

    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  nginx:
    image: nginx:latest
    container_name: devops-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend
      - frontend