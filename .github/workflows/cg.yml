name: AWS CD Workflow

on:
  workflow_run:
    workflows: ["CI workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Go to home directory
            cd ~

            # Clone repo if not exists
            if [ ! -d "github-actions-demo" ]; then
              git clone https://github.com/Priyanshu11111111/student-devops-learning-platform-v2.git
            fi

            # Go inside project
            cd github-actions-demo

            # Pull latest code
            git pull origin main

            # Stop old containers
            docker compose down

            # Pull latest DockerHub images
            docker compose pull

            # Start updated containers
            docker compose up -d

            # Remove unused Docker images
            docker image prune -f