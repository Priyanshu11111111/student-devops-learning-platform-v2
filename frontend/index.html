<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Learning Platform</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .course {
      background: #eef5ff;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>DevOps Learning Platform</h1>

  <div class="form">
    <input type="text" id="courseName" placeholder="Enter Course Name">
    <button onclick="addCourse()">Add Course</button>
  </div>

  <button onclick="loadCourses()">Load Courses</button>

  <div id="courses"></div>

</div>

<script>

async function loadCourses() {

  const response = await fetch('/api/courses');
  const data = await response.json();

  const container = document.getElementById('courses');
  container.innerHTML = '';

  data.forEach(course => {

    container.innerHTML += `
      <div class="course">
        <h3>${course.name}</h3>
      </div>
    `;
  });
}

async function addCourse() {

  const courseName = document.getElementById('courseName').value;

  if (!courseName) {
    alert("Please enter a course name");
    return;
  }

  await fetch('/api/courses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: courseName
    })
  });

  document.getElementById('courseName').value = '';

  loadCourses();
}

window.onload = loadCourses;

</script>

</body>
</html>
